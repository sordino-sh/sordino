# Sordino Codex/OpenAI project config seed.

[proxy]
bind = "127.0.0.1"
upstream_base_url = "https://api.openai.com"

[engine]
enabled = true
profile = "balanced"
score_threshold = 0.5
language = "en"
enabled_categories = ["secrets", "financial", "identity", "contact"]
default_operator = { kind = "token" }
fail_closed = true

[engine.ml]
enabled = false
model = "openai/privacy-filter"

[engine.reveal_marker]
enabled = true
prefix = "\u001b[97;44m"
suffix = "\u001b[0m"

[engine.entity_operators]
CREDIT_CARD = { kind = "mask", char = "*", from_end = 4 }

[engine.allow_list]
exact = ["OpenAI", "Codex", "127.0.0.1"]
exact_ci = ["localhost"]
patterns = ['^\d{4}$']
