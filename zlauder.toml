# ZlauDeR runtime config — the concise default for running the proxy from this checkout.
#
# One knob: pick a profile. The full annotated surface lives in zlauder.toml.example.

[engine]
# Presets: "strict" | "balanced" | "minimal" | "secrets_only". Balanced masks
# secrets + financial + identity + contact at threshold 0.5 with reversible tokens
# (CVV is redacted and credit-card numbers are last-4 masked — both irreversible,
# built in, no config needed).
profile = "balanced"

# Don't tokenize bare 4-digit numbers (years, ports, small counts).
[engine.allow_list]
patterns = ['^\d{4}$']

# Register a credential / DSN so it masks as ONE token instead of being half-detected:
#   /zlauder:secrets register database_url env:DATABASE_URL --operator broker
# [[secrets]]
# name = "database_url"
# from_env = "DATABASE_URL"
# operator = "broker"

# Pin a static proxy port (default: an OS-assigned ephemeral port, published to a
# per-project rendezvous file so projects never collide):
# [proxy]
# port = 8787
