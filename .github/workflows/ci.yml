name: ci

# Build + test on every push to main and every PR, so a tag never publishes
# binaries from a broken tree. The Linux job mirrors the release build (default
# features, --locked) on the cheapest target; a macOS-ARM job (push-to-main only,
# to bound the 10x macOS minutes) compiles the aarch64-apple-darwin binary so the
# macOS-only Metal code path (candle-metal-kernels -> objc2) can't slip a break
# past CI and into the release build.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Harden cargo network I/O against transient "HTTP2 framing layer" resets when
# pulling from crates.io (force HTTP/1.1, retry more).
env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          # While the dep repos are private, fork PRs have no access to this
          # secret and cannot build — expected until presidio-rs / llm-wires
          # are public, after which the credential step is skipped anyway.
          deps-token: ${{ secrets.DEPS_TOKEN }}
      - name: Build workspace
        run: cargo build --workspace --locked
      - name: Test workspace
        run: cargo test --workspace --locked
      - name: Validate Codex plugin package
        shell: bash
        run: |
          set -euo pipefail
          test "$(jq -r .name codex-sordino-plugin/.codex-plugin/plugin.json)" = "sordino-openai"
          jq -e '.version | test("^[0-9]+\\.[0-9]+\\.[0-9]+$")' codex-sordino-plugin/.codex-plugin/plugin.json >/dev/null
          jq -e '.hooks.SessionStart[0].hooks[0].command == "${CLAUDE_PLUGIN_ROOT}/scripts/codex-session-start.sh"' codex-sordino-plugin/hooks/hooks.json >/dev/null
          bash -n codex-sordino-plugin/scripts/_resolve-bins.sh
          bash -n codex-sordino-plugin/scripts/codex-session-start.sh
          test -f codex-sordino-plugin/sordino.toml
          test -f codex-sordino-plugin/skills/sordino-openai/SKILL.md

  # The macOS-ARM Metal code path (presidio-classifier `metal` feature ->
  # candle-core/metal -> candle-metal-kernels -> objc2) is compiled on NO other
  # target, so the Linux job above can't catch a break in it. This leg compiles
  # the aarch64-apple-darwin release binary (default features => Metal in) exactly
  # as release.yml does, so a wiring break surfaces here instead of mid-release.
  # Push-to-main only: macOS runners bill ~10x, and fork PRs can't build anyway
  # (no DEPS_TOKEN — see build-test).
  build-macos:
    name: build macOS (aarch64, Metal)
    if: github.event_name == 'push'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          target: aarch64-apple-darwin
          deps-token: ${{ secrets.DEPS_TOKEN }}
      - name: Build aarch64-apple-darwin (default features -> Metal compiled in)
        run: cargo build --release --locked --target aarch64-apple-darwin --bin sordino-proxy --bin sordino-hooks
