name: ci

# Build + test on every push to main and every PR, so a tag never publishes
# binaries from a broken tree. Mirrors the release build (default features,
# --locked) on the cheapest single target.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Harden cargo network I/O against transient "HTTP2 framing layer" resets when
# pulling from crates.io (force HTTP/1.1, retry more).
env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          # While the dep repos are private, fork PRs have no access to this
          # secret and cannot build — expected until presidio-rs / llm-wires
          # are public, after which the credential step is skipped anyway.
          deps-token: ${{ secrets.DEPS_TOKEN }}
      - name: Build workspace
        run: cargo build --workspace --locked
      - name: Test workspace
        run: cargo test --workspace --locked
      # Non-blocking drift signal: surfaces when a branch-tracked git dep's lock
      # has fallen behind its upstream branch, so it is seen on PRs/main long
      # before a tag turns it into a release gate (release.yml runs this --strict).
      - name: Deps freshness (warn only)
        if: always()
        env:
          DEPS_TOKEN: ${{ secrets.DEPS_TOKEN }}
        run: bash scripts/check-deps-fresh.sh --warn
      - name: Validate Codex plugin package
        shell: bash
        run: |
          set -euo pipefail
          test "$(jq -r .name codex-zlauder-plugin/.codex-plugin/plugin.json)" = "zlauder-openai"
          jq -e '.version | test("^[0-9]+\\.[0-9]+\\.[0-9]+$")' codex-zlauder-plugin/.codex-plugin/plugin.json >/dev/null
          jq -e '.hooks.SessionStart[0].hooks[0].command == "./scripts/session-start.sh"' codex-zlauder-plugin/hooks/hooks.json >/dev/null
          bash -n codex-zlauder-plugin/scripts/_resolve-bins.sh
          bash -n codex-zlauder-plugin/scripts/session-start.sh
          test -f codex-zlauder-plugin/zlauder.toml
          test -f codex-zlauder-plugin/skills/zlauder-openai/SKILL.md
