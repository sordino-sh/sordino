name: release

# Cuts a Sordino release: builds sordino-proxy/sordino-hooks for every supported
# platform, then ships them three ways —
#   1. force-pushes the `plugin-dist` branch (the Claude Code plugin + a
#      bin/<triple>/ dir per platform) so a `/plugin install` lands a ready-to-run
#      binary with NO compile and NO runtime download;
#   2. force-pushes the `codex-plugin-dist` branch (the Codex plugin + the same
#      per-platform binaries) for Codex plugin installs; and
#   3. attaches per-platform tarballs + checksums to a GitHub Release for manual
#      / on-PATH installs, plus a Codex plugin source tarball.
# See docs/RELEASING.md.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build & publish (e.g. v0.2.0)"
        required: true

permissions:
  contents: write          # create the Release + force-push plugin dist branches

# Harden cargo network I/O against transient runner blips — notably the
# intermittent "HTTP2 framing layer / connection reset by peer" when pulling
# crates from crates.io. Force HTTP/1.1 and retry more before failing.
env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  # Cheap gate that runs FIRST: tag must match the shipped plugin.json versions.
  # Lives ahead of `test`/`build` so a version mismatch fails in seconds instead
  # of after the multi-platform build matrix burns CI minutes. Its resolved
  # tag/ver are exported for `publish` to reuse (no second check needed there).
  verify:
    name: verify tag & versions
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      ver: ${{ steps.v.outputs.ver }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - name: Resolve & verify tag
        id: v
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ github.event.inputs.tag || github.ref_name }}'
          case "$tag" in v*) ;; *) echo "::error::expected a v* tag, got '$tag'"; exit 1 ;; esac
          ver="$(jq -r .version sordino-plugin/.claude-plugin/plugin.json)"
          if [ "$tag" != "v$ver" ]; then
            echo "::error::tag '$tag' != plugin.json version 'v$ver'. Bump sordino-plugin/.claude-plugin/plugin.json (and the marketplace entry + Cargo version) to match the tag before releasing." >&2
            exit 1
          fi
          codex_ver="$(jq -r .version codex-sordino-plugin/.codex-plugin/plugin.json)"
          if [ "$tag" != "v$codex_ver" ]; then
            echo "::error::tag '$tag' != Codex plugin version 'v$codex_ver'. Bump codex-sordino-plugin/.codex-plugin/plugin.json to match the tag before releasing." >&2
            exit 1
          fi
          # Cargo workspace version — the SINGLE source of truth. Parsed with sed
          # (this job has no setup-rust, so `cargo metadata` is unavailable).
          cargo_ver="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          [ "$tag" = "v$cargo_ver" ] || { echo "::error::tag '$tag' != Cargo.toml version 'v$cargo_ver'"; exit 1; }
          # marketplace.json entry for the sordino plugin must track the tag too.
          mkt_ver="$(jq -r '.plugins[]|select(.name=="sordino").version' .claude-plugin/marketplace.json)"
          [ "$tag" = "v$mkt_ver" ] || { echo "::error::tag '$tag' != marketplace.json version 'v$mkt_ver'"; exit 1; }
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ver=$ver" >> "$GITHUB_OUTPUT"

  test:
    name: test
    needs: verify
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: ./.github/actions/setup-rust
        with:
          deps-token: ${{ secrets.DEPS_TOKEN }}
      - name: Test workspace
        run: cargo test --workspace --locked

  build:
    name: build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  runner: ubuntu-22.04 }
          - { target: aarch64-unknown-linux-gnu, runner: ubuntu-22.04-arm }
          # Both macOS targets build on Apple Silicon: macos-15 (current GA image,
          # what `macos-latest` points to, supported into Fall 2027). x86_64 is
          # cross-compiled (`cargo build --target x86_64-apple-darwin`). We avoid
          # macos-14 (deprecation begins 2026-07-06) and macos-13 (retired
          # 2025-12-04). For a *native* Intel build instead of cross, the
          # `macos-15-intel` label exists until ~Aug 2027.
          - { target: x86_64-apple-darwin,        runner: macos-15 }
          - { target: aarch64-apple-darwin,       runner: macos-15 }
          - { target: x86_64-pc-windows-msvc,     runner: windows-latest }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: ./.github/actions/setup-rust
        with:
          target: ${{ matrix.target }}
          deps-token: ${{ secrets.DEPS_TOKEN }}
      - name: Build release binaries (default features)
        run: cargo build --release --locked --target ${{ matrix.target }} --bin sordino-proxy --bin sordino-hooks
      - name: Stage artifacts (flat, triple-named)
        shell: bash
        run: |
          set -euo pipefail
          t='${{ matrix.target }}'
          rel="target/$t/release"
          mkdir -p out
          exe=""
          archive="sordino-$t.tar.gz"
          if [[ "$t" == *-windows-msvc ]]; then
            exe=".exe"
            archive="sordino-$t.zip"
          fi
          # loose binaries -> assembled into plugin-dist bin/<triple>/ by `publish`
          cp "$rel/sordino-proxy$exe" "out/sordino-proxy-$t$exe"
          cp "$rel/sordino-hooks$exe" "out/sordino-hooks-$t$exe"
          # archive + checksum -> Release assets (mode preserved from the +x source)
          if [ -n "$exe" ]; then
            ( cd "$rel" && 7z a "$GITHUB_WORKSPACE/out/$archive" "sordino-proxy$exe" "sordino-hooks$exe" )
          else
            tar -C "$rel" -czf "out/$archive" sordino-proxy sordino-hooks
          fi
          ( cd out
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$archive" > "$archive.sha256"
            else
              shasum -a 256 "$archive" > "$archive.sha256"
            fi )
      - uses: actions/upload-artifact@v4
        with:
          name: out-${{ matrix.target }}
          path: out
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish (plugin dist + Release)
    needs: [verify, build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dl
          pattern: out-*

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          # artifact nesting can vary; every file is uniquely (triple-)named, so
          # collect them all into one flat dir by basename.
          mkdir -p stage
          find dl -type f -exec cp -f {} stage/ \;
          ls -l stage

      - name: Assemble plugin payloads
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ needs.verify.outputs.tag }}'
          rm -rf pkg pkg-codex
          mkdir pkg pkg-codex
          # plugin files: manifest, hooks, scripts, configs, docs, skills/commands
          cp -a sordino-plugin/. pkg/
          cp -a codex-sordino-plugin/. pkg-codex/
          # per-platform binaries: stage/sordino-{proxy,hooks}-<triple> -> payload/bin/<triple>/
          shopt -s nullglob
          found=0
          for proxy in stage/sordino-proxy-*; do
            found=1
            name="$(basename "$proxy")"
            t="${name#sordino-proxy-}"
            exe=""
            case "$t" in
              *.exe) t="${t%.exe}"; exe=".exe" ;;
            esac
            mkdir -p "pkg/bin/$t"
            cp "stage/sordino-proxy-$t$exe" "pkg/bin/$t/sordino-proxy$exe"
            cp "stage/sordino-hooks-$t$exe"  "pkg/bin/$t/sordino-hooks$exe"
            chmod +x "pkg/bin/$t/sordino-proxy$exe" "pkg/bin/$t/sordino-hooks$exe"
            mkdir -p "pkg-codex/bin/$t"
            cp "stage/sordino-proxy-$t$exe" "pkg-codex/bin/$t/sordino-proxy$exe"
            cp "stage/sordino-hooks-$t$exe"  "pkg-codex/bin/$t/sordino-hooks$exe"
            chmod +x "pkg-codex/bin/$t/sordino-proxy$exe" "pkg-codex/bin/$t/sordino-hooks$exe"
          done
          [ "$found" = 1 ] || { echo "::error::no staged binaries found"; exit 1; }
          # stamp the release tag + keep the shipped plugin.json versions aligned to it
          printf '%s\n' "$tag" > pkg/.sordino-release
          printf '%s\n' "$tag" > pkg-codex/.sordino-release
          tmp="$(mktemp)"
          jq --arg v '${{ needs.verify.outputs.ver }}' '.version=$v' pkg/.claude-plugin/plugin.json > "$tmp"
          mv "$tmp" pkg/.claude-plugin/plugin.json
          tmp="$(mktemp)"
          jq --arg v '${{ needs.verify.outputs.ver }}' '.version=$v' pkg-codex/.codex-plugin/plugin.json > "$tmp"
          mv "$tmp" pkg-codex/.codex-plugin/plugin.json
          echo "Claude payload:"; find pkg -type f | sort
          echo "Codex payload:"; find pkg-codex -type f | sort

      - name: Archive Codex plugin payload
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ needs.verify.outputs.tag }}'
          tar -C pkg-codex -czf "stage/sordino-openai-codex-plugin-$tag.tar.gz" .
          ( cd stage
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "sordino-openai-codex-plugin-$tag.tar.gz" > "sordino-openai-codex-plugin-$tag.tar.gz.sha256"
            else
              shasum -a 256 "sordino-openai-codex-plugin-$tag.tar.gz" > "sordino-openai-codex-plugin-$tag.tar.gz.sha256"
            fi )

      - name: Force-push plugin dist branches
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag='${{ needs.verify.outputs.tag }}'
          remote="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          cd pkg
          git init -q -b plugin-dist
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "plugin-dist: $tag (${GITHUB_SHA})"
          # orphan + force-push => plugin-dist is always a single flat commit, so
          # the binaries never accumulate in the repo's history.
          git push -f "$remote" plugin-dist
          cd ../pkg-codex
          git init -q -b codex-plugin-dist
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "codex-plugin-dist: $tag (${GITHUB_SHA})"
          git push -f "$remote" codex-plugin-dist

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag='${{ needs.verify.outputs.tag }}'
          assets=(stage/*.tar.gz stage/*.zip stage/*.sha256)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" --title "$tag" --generate-notes
          fi
